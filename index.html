<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Wall Wars - Un gioco di strategia a 2 giocatori dove costruisci muri per formare rettangoli e guadagnare punti">
    <title>Wall Wars - Gioco di Strategia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- ===== START SCREEN ===== -->
    <div id="start-screen" class="screen active">
        <div class="start-container">
            <div class="logo-wrapper">
                <div class="logo-glow"></div>
                <h1 class="game-logo">WALL<span class="logo-accent">WARS</span></h1>
                <p class="game-subtitle">Costruisci. Blocca. Conquista.</p>
            </div>
            <div class="start-info">
                <div class="info-card">
                    <div class="info-icon">🎯</div>
                    <div class="info-text">
                        <strong>Obiettivo</strong>
                        <span>Primo a 10 punti</span>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">🧱</div>
                    <div class="info-text">
                        <strong>Costruisci</strong>
                        <span>Forma rettangoli con i muri</span>
                    </div>
                </div>
                <div class="info-card">
                    <div class="info-icon">🚧</div>
                    <div class="info-text">
                        <strong>Blocca</strong>
                        <span>Piazza blocchi strategici</span>
                    </div>
                </div>
            </div>
            <div class="player-names-setup">
                <div class="name-input-group p1-input-group">
                    <label for="p1-name"><span class="dot p1-dot"></span> Giocatore 1</label>
                    <input type="text" id="p1-name" placeholder="Nome..." maxlength="12" value="Cyan">
                </div>
                <div class="vs-divider">VS</div>
                <div class="name-input-group p2-input-group">
                    <label for="p2-name"><span class="dot p2-dot"></span> Giocatore 2</label>
                    <input type="text" id="p2-name" placeholder="Nome..." maxlength="12" value="Rosa">
                </div>
            </div>
            <button id="start-btn" class="btn-primary pulse-btn">
                <span>GIOCA</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- ===== GAME SCREEN ===== -->
    <div id="game-screen" class="screen">
        <div class="game-layout">
            <!-- LEFT: Board -->
            <div class="game-left">
                <div class="board-wrapper" id="board-wrapper">
                    <canvas id="game-board"></canvas>
                </div>
            </div>

            <!-- RIGHT: All controls -->
            <div class="game-right">
                <!-- Turn info -->
                <div class="turn-section">
                    <div class="turn-badge" id="turn-badge">
                        <span class="turn-dot" id="turn-dot"></span>
                        <span id="turn-text">Preparazione</span>
                    </div>
                    <div class="action-message" id="action-message">Premi GIOCA per iniziare</div>
                </div>

                <!-- Player panels -->
                <div class="players-section">
                    <div class="player-panel p1-panel" id="p1-panel">
                        <div class="player-indicator">
                            <span class="player-dot p1-color"></span>
                            <span class="player-name" id="p1-display-name">Cyan</span>
                        </div>
                        <div class="player-score-row">
                            <div class="player-score" id="p1-score">0</div>
                            <div class="score-label">/ 10</div>
                        </div>
                        <div class="score-bar-container">
                            <div class="score-bar p1-bar" id="p1-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="player-panel p2-panel" id="p2-panel">
                        <div class="player-indicator">
                            <span class="player-dot p2-color"></span>
                            <span class="player-name" id="p2-display-name">Rosa</span>
                        </div>
                        <div class="player-score-row">
                            <div class="player-score" id="p2-score">0</div>
                            <div class="score-label">/ 10</div>
                        </div>
                        <div class="score-bar-container">
                            <div class="score-bar p2-bar" id="p2-bar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Dice -->
                <div class="dice-section" id="dice-area" style="display:none;">
                    <div class="dice" id="dice">?</div>
                    <div class="walls-counter" id="walls-counter" style="display:none;">
                        <span class="walls-icon">🧱</span>
                        <span id="walls-num">0</span>
                        <span>muri rimasti</span>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="actions-section">
                    <div class="action-buttons" id="action-buttons" style="display:none;">
                        <button class="btn-action btn-roll" id="btn-roll">
                            <span class="btn-icon">🎲</span>
                            <span class="btn-label">Tira il Dado</span>
                            <span class="btn-desc">Piazza muri (D3)</span>
                        </button>
                        <button class="btn-action btn-block" id="btn-block">
                            <span class="btn-icon">🚧</span>
                            <span class="btn-label">Piazza Blocco</span>
                            <span class="btn-desc">Blocca l'avversario</span>
                        </button>
                    </div>
                    <button class="btn-action btn-end-turn" id="btn-end-turn" style="display:none;">
                        <span class="btn-icon">✅</span>
                        <span class="btn-label">Fine Turno</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== VICTORY SCREEN ===== -->
    <div id="victory-screen" class="screen">
        <div class="victory-container">
            <div class="confetti-container" id="confetti-container"></div>
            <div class="trophy-wrapper">
                <div class="trophy">🏆</div>
            </div>
            <h2 class="victory-title" id="victory-title">Vittoria!</h2>
            <p class="victory-subtitle" id="victory-subtitle"></p>
            <div class="final-scores" id="final-scores"></div>
            <button class="btn-primary" id="btn-restart">
                <span>Gioca Ancora</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- ===== SCORE POPUP ===== -->
    <div class="score-popup" id="score-popup">
        <span class="popup-points" id="popup-points">+0</span>
        <span class="popup-text">punti!</span>
    </div>

    <script src="game.js"></script>
</body>

</html>
